<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DocuMind — Unlock Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0f172a,#1e1b4b 50%,#0f172a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-radius:24px;padding:44px;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,0.4);text-align:center}
.vault-icon{font-size:56px;margin-bottom:20px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;margin-bottom:6px}
.sub{color:rgba(255,255,255,0.45);font-size:13.5px;margin-bottom:32px}
input{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:18px;outline:none;text-align:center;letter-spacing:6px;transition:all 0.2s;margin-bottom:16px}
input:focus{border-color:#e85d26;background:rgba(255,255,255,0.1)}
.btn{width:100%;background:linear-gradient(135deg,#e85d26,#f5a623);border:none;border-radius:12px;padding:14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(232,93,38,0.35)}
.btn:hover{transform:translateY(-2px)}
.err{color:#f87171;font-size:13px;margin-top:12px;display:none}
.hint{font-size:12px;color:rgba(255,255,255,0.25);margin-top:20px}
.shake{animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style></head><body>
<div class="card">
  <div class="vault-icon">🔐</div>
  <h1>DocuMind Vault</h1>
  <p class="sub">Enter your PIN to unlock your documents</p>
  <input type="password" id="pin" placeholder="• • • •" autocomplete="current-password" oninput="clearErr()">
  <button class="btn" onclick="login()">🔓 Unlock Vault</button>
  <div class="err" id="err">❌ Incorrect PIN. Please try again.</div>
  <p class="hint">Your data is AES-256 encrypted</p>
</div>
<script>
function clearErr(){document.getElementById('err').style.display='none';}
async function login(){
  const p=document.getElementById('pin').value.trim();
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:p})});
  const d=await r.json();
  if(d.ok){window.location.href='/';}
  else{
    const inp=document.getElementById('pin');
    inp.classList.add('shake');
    setTimeout(()=>inp.classList.remove('shake'),400);
    document.getElementById('err').style.display='block';
    inp.value='';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
document.getElementById('pin').focus();
</script></body></html>
